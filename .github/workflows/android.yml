name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Environment Secrets
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "GEMINI_API_KEY=mock-key-for-ci" > .env
        fi
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Grant execute permission and regenerate wrapper
      run: |
        gradle wrapper
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Run Local JVM Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Prepare APK for Distribution
      run: |
        mkdir -p build-artifacts
        cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/e-Surat.apk

    - name: Upload Ready-to-Use APK
      uses: actions/upload-artifact@v4
      with:
        name: e-Surat-APK
        path: build-artifacts/e-Surat.apk
        if-no-files-found: error
